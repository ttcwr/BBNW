<!DOCTYPE html>

<meta charset="UTF-8">

<title>BB NEWSWIRE // MATRIX TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:    #080810;
  --s0:    #0a0a14;
  --s1:    #0d0d18;
  --s2:    #10101c;
  --s3:    #121220;
  --s4:    #151524;
  --s5:    #181828;

  /* Border ladder — neutral blue-grey */
  --b0: rgba(140,180,255,.04);
  --b1: rgba(140,180,255,.07);
  --b2: rgba(140,180,255,.12);
  --b3: rgba(140,180,255,.20);
  --b4: rgba(140,180,255,.35);
  --b5: rgba(140,180,255,.55);

  /* Text — white/light headlines, green only as accent */
  --t0: #e2e8f0;
  --t1: #94a3b8;
  --t2: #64748b;
  --t3: #475569;
  --t4: #2d3748;
  --t5: #1a202c;

  /* Yellow accent — kept from original */
  --y:   #f5d800;
  --yl:  #ffe85a;
  --y04: rgba(245,216,0,.04);
  --y08: rgba(245,216,0,.08);
  --y15: rgba(245,216,0,.15);
  --y25: rgba(245,216,0,.25);
  --y45: rgba(245,216,0,.45);

  /* Category neons — matrix-shifted */
  --cx: #00cfff;   /* X / cyan-blue   */
  --cw: #bf5fff;   /* Whale / purple   */
  --cc: #00ff41;   /* Onchain / matrix-green */
  --cm: #4dffb4;   /* Media / mint    */
  --cg: #f5d800;   /* Gov / yellow    */
  --cr: #ff9500;   /* Wire / amber    */

  /* Status */
  --green: #00ff41;
  --red:   #ff2a2a;
  --tg:    #00cfff;

  --mono: 'JetBrains Mono', 'Consolas', monospace;
  --sans: 'Inter', system-ui, sans-serif;
  --vt:   'JetBrains Mono', monospace;  /* was VT323 — now crisp */
}

/* ══ THEME: MONO ══
   Inspired by CoinMarketCap: pure white, clean sans,
   subtle grey borders, red/green only for data
══ */
[data-theme="mono"]{
  --bg:    #f8fafd;
  --s0:    #ffffff;
  --s1:    #f4f6f9;
  --s2:    #eef0f4;
  --s3:    #e4e7ed;
  --s4:    #d8dce5;
  --s5:    #c8cdd8;
  --b0: rgba(0,0,40,.03);
  --b1: rgba(0,0,40,.06);
  --b2: rgba(0,0,40,.10);
  --b3: rgba(0,0,40,.18);
  --b4: rgba(0,0,40,.30);
  --b5: rgba(0,0,40,.55);
  --t0: #0d1421;
  --t1: #222d3e;
  --t2: #58667e;
  --t3: #8a97aa;
  --t4: #b0bac8;
  --t5: #d4dae4;
  --green:  #16c784;
  --y:      #0d1421;
  --cx: #3861fb; --cw: #8c52ff; --cc: #16c784;
  --cm: #0d1421; --cg: #e84142; --cr: #3861fb;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', -apple-system, sans-serif;
}
[data-theme="mono"] body,
[data-theme="mono"] html{ background:var(--bg); }
[data-theme="mono"] .topbar{
  background:#fff;
  border-bottom:1px solid #e4e7ed;
  box-shadow:0 1px 4px rgba(0,0,40,.06);
}

  color:#3861fb;border-color:#d0d8f0;

}
[data-theme="mono"] .logo-name{

  color:#0d1421;font-weight:700;letter-spacing:-.01em;
}
[data-theme="mono"] .logo-name em{color:#3861fb;font-style:normal;}
[data-theme="mono"] .tab{

}

[data-theme="mono"] .catbar{

}

}

[data-theme="mono"] .ncard::before{display:none!important;}

[data-theme="mono"] .ncard:hover{
  border-color:#c8cdd8!important;

[data-theme="trading"] .kbd-key{
  font-family:'IBM Plex Mono',monospace;
  background:#0a0a0a;border-color:#282828;color:#555;border-radius:2px;
}

/* ══ THEME SWITCHER DROPDOWN ══ *//* THEME SWITCHER DROPDOWN */
.theme-switcher{
  position:relative;
  display:flex;align-items:center;
  padding:0 16px;border-left:1px solid var(--b3);
  cursor:pointer;user-select:none;
}
.theme-btn{
  display:flex;align-items:center;gap:7px;
  font-family:var(--mono);font-size:9px;font-weight:500;
  color:var(--t2);letter-spacing:.1em;text-transform:uppercase;
  background:none;border:none;cursor:pointer;padding:0;
}
.theme-design-label{
  color:var(--t2);font-size:9px;letter-spacing:.15em;font-weight:600;
  border-right:1px solid var(--b3);padding-right:8px;margin-right:2px;
}
.theme-btn:hover{color:var(--t0);}
.theme-arrow{font-size:8px;color:var(--t3);transition:transform .15s;}
.theme-menu{
  position:absolute;top:calc(100% + 4px);right:0;
  background:var(--s1);border:1px solid var(--b3);
  border-radius:3px;min-width:160px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  z-index:1000;display:none;overflow:hidden;
}
.theme-menu.open{display:block;}
.theme-option{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  color:var(--t2);transition:all .1s;
  border-bottom:1px solid var(--b1);
}
.theme-option:last-child{border-bottom:none;}
.theme-option:hover{background:var(--b1);color:var(--t0);}
.theme-option.active{color:var(--t0);}
.theme-option.active::after{content:'✓';margin-left:auto;color:var(--green);}
.theme-swatch{
  width:10px;height:10px;border-radius:2px;flex-shrink:0;
  border:1px solid var(--b3);
}


html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t2);}
body{font-family:var(--mono);font-size:12px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* CRT scanline overlay on entire page */
body::after{
  content:'';pointer-events:none;
  position:fixed;inset:0;z-index:9999;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,.02) 0px, rgba(255,255,255,.02) 1px,
    transparent 1px, transparent 3px
  );
}

/* Phosphor flicker — very subtle */
@keyframes flicker{
  0%,100%{opacity:1;}
  92%{opacity:.97;}
  93%{opacity:.94;}
  94%{opacity:.97;}
}
body{animation:flicker 8s ease infinite;}

/* ═══════════════════════════════════
   TOPBAR
═══════════════════════════════════ */
.topbar{
  height:50px;background:var(--s0);
  border-bottom:1px solid var(--b2);
  display:flex;align-items:stretch;
  position:relative;z-index:40;flex-shrink:0;
}
/* Green crown line */
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;z-index:1;
  background:linear-gradient(90deg,
    transparent 0%,rgba(0,255,65,.15) 4%,
    var(--t0) 20%,#80ffb0 50%,var(--t0) 80%,
    rgba(0,255,65,.15) 96%,transparent 100%);
  box-shadow:0 0 8px rgba(0,255,65,.8),0 0 30px rgba(0,255,65,.3),0 0 80px rgba(0,255,65,.1);
}
.topbar::after{
  content:'';position:absolute;top:1px;left:0;right:0;height:30px;z-index:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,255,65,.04) 0%,transparent 100%);
}

/* Logo */
.logo{
  display:flex;align-items:center;gap:13px;
  padding:0 24px;border-right:1px solid var(--b2);
  flex-shrink:0;min-width:196px;position:relative;z-index:1;
}
.logo-badge{
  font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:.12em;color:var(--t0);
  padding:2px 10px;border:1px solid var(--b4);
  border-radius:2px;background:var(--b0);
  box-shadow:0 0 12px rgba(0,255,65,.2),inset 0 0 8px rgba(0,255,65,.05);
  white-space:nowrap;flex-shrink:0;text-shadow:0 0 10px var(--t0);
}
.logo-name{
  font-family:var(--sans);font-weight:700;font-size:18px;
  color:var(--t0);letter-spacing:.06em;white-space:nowrap;
  text-shadow:0 0 12px var(--t0),0 0 25px rgba(0,255,65,.4);
}
.logo-name em{color:var(--y);font-style:normal;text-shadow:0 0 12px var(--y);}

/* Tabs */
.tabs{display:flex;height:50px;margin-left:2px;position:relative;z-index:1;}
.tab{
  padding:0 20px;height:50px;display:flex;align-items:center;gap:7px;
  font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--t4);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .14s,border-color .14s,background .12s;user-select:none;
}
.tab:hover{color:var(--t3);background:var(--b0);}
.tab.on{color:var(--t0);border-bottom-color:var(--t0);text-shadow:0 0 8px var(--t0);}
.tab-n{
  background:var(--t0);color:#000;
  font-family:var(--mono);font-size:8px;font-weight:900;
  min-width:17px;height:15px;padding:0 4px;border-radius:1px;
  display:inline-flex;align-items:center;justify-content:center;
}

/* Top-right widgets */
.topright{margin-left:auto;display:flex;align-items:stretch;}
.tw{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 18px;border-left:1px solid var(--b2);gap:1px;min-width:76px;
  cursor:default;transition:background .1s;position:relative;
}
.tw:hover{background:var(--s2);}
.tw-v{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--t1);line-height:1;text-shadow:0 0 6px var(--t1);}
.tw-v.y{color:var(--y);text-shadow:0 0 8px var(--y);}
.tw-v.g{color:var(--green);text-shadow:0 0 8px var(--green);}
.tw-v.r{color:var(--red);text-shadow:0 0 6px var(--red);}
.tw-l{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);}

.btcw,.ethw{
  display:flex;align-items:center;gap:12px;
  padding:0 20px;border-left:1px solid var(--b2);
  transition:background .1s;cursor:default;
}
.btcw:hover,.ethw:hover{background:var(--s2);}
.btc-col{display:flex;flex-direction:column;gap:1px;}
.btc-pair{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--t4);}
.btc-pr{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--y);letter-spacing:.04em;line-height:1;text-shadow:0 0 10px var(--y);}
.eth-pr{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--cx);letter-spacing:.04em;line-height:1;text-shadow:0 0 10px var(--cx);}
.btc-ch{font-family:var(--mono);font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:2px;border:1px solid;}
.btc-ch.up{color:var(--green);background:rgba(0,255,65,.08);border-color:rgba(140,160,200,.2);}
.btc-ch.dn{color:var(--red);background:rgba(255,42,42,.08);border-color:rgba(255,42,42,.2);}

.live-w{display:flex;align-items:center;gap:7px;padding:0 16px;border-left:1px solid var(--b2);}
.lpip{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pip 2s ease infinite;}
@keyframes pip{0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,.8);}50%{box-shadow:0 0 0 5px rgba(0,255,65,0);}}
.ltxt{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.12em;}

.clk-w{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 22px;border-left:1px solid var(--b2);gap:2px;}
.clk-t{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--t2);letter-spacing:.05em;text-shadow:0 0 6px var(--t2);}
.clk-d{font-family:var(--mono);font-size:7.5px;color:var(--t4);letter-spacing:.08em;}

/* ═══════════════════════════════════
   STAT STRIP
═══════════════════════════════════ */
.statstrip{
  height:76px;flex-shrink:0;
  display:flex;align-items:stretch;
  background:var(--s0);border-bottom:1px solid var(--b2);
}
.sc{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:0 22px;border-right:1px solid var(--b2);
  position:relative;overflow:hidden;cursor:default;transition:background .12s;
}
.sc:last-child{border-right:none;}
.sc:hover{background:var(--s2);}
.sc::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  transition:opacity .14s;
}
.sc.y::before  {background:linear-gradient(90deg,var(--y),rgba(245,216,0,.3));}
.sc.g::before  {background:linear-gradient(90deg,var(--green),rgba(0,255,65,.2));}
.sc.r::before  {background:linear-gradient(90deg,var(--red),rgba(255,42,42,.2));}
.sc.cc::before {background:linear-gradient(90deg,var(--cc),rgba(0,255,65,.2));}
.sc.cw::before {background:linear-gradient(90deg,var(--cw),rgba(191,95,255,.2));}
.sc.cx::before {background:linear-gradient(90deg,var(--cx),rgba(0,207,255,.2));}
/* CRT corner grid */
.sc::after{
  content:'';position:absolute;right:8px;bottom:6px;
  width:14px;height:14px;opacity:.08;
  background:linear-gradient(var(--t0) 1px,transparent 1px),linear-gradient(90deg,var(--t0) 1px,transparent 1px);
  background-size:4px 4px;
}
.sc-lbl{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--t4);margin-bottom:4px;font-weight:500;}
.sc-val{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;letter-spacing:-.02em;text-shadow:0 0 10px currentColor;}
.sc-sub{font-family:var(--mono);font-size:9px;color:var(--t4);margin-top:3px;}

/* ═══════════════════════════════════
   CATEGORY BAR
═══════════════════════════════════ */
.catbar{
  height:38px;flex-shrink:0;
  background:var(--s1);border-bottom:1px solid var(--b2);
  display:flex;align-items:center;padding:0 14px;gap:4px;
  position:relative;z-index:20;
}
.cat{
  display:flex;align-items:center;gap:6px;
  height:26px;padding:0 11px;border-radius:2px;
  font-family:var(--mono);font-size:8.5px;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;user-select:none;white-space:nowrap;
  border:1px solid var(--b1);color:var(--t4);background:transparent;
  transition:all .13s;
}
.cat:hover{border-color:var(--b3);color:var(--t2);background:var(--b0);}
.cpip{width:5px;height:5px;border-radius:50%;background:var(--t4);flex-shrink:0;transition:all .13s;}
.cat.on{border-color:var(--b3);color:var(--t1);background:var(--b0);}
.cat.on .cpip{box-shadow:0 0 7px currentColor;}
.cat.on.cx{border-color:rgba(0,207,255,.4);color:var(--cx);}   .cat.on.cx .cpip{background:var(--cx);}
.cat.on.cw{border-color:rgba(191,95,255,.4);color:var(--cw);}  .cat.on.cw .cpip{background:var(--cw);}
.cat.on.cc{border-color:rgba(0,255,65,.4); color:var(--cc);}   .cat.on.cc .cpip{background:var(--cc);}
.cat.on.cm{border-color:rgba(77,255,180,.4);color:var(--cm);}  .cat.on.cm .cpip{background:var(--cm);}
.cat.on.cg{border-color:rgba(245,216,0,.4);color:var(--cg);}   .cat.on.cg .cpip{background:var(--cg);}
.cat.on.cr{border-color:rgba(255,149,0,.4);color:var(--cr);}   .cat.on.cr .cpip{background:var(--cr);}
.cat-div{width:1px;height:14px;background:var(--b2);margin:0 5px;flex-shrink:0;}

.srch-w{
  display:flex;align-items:center;gap:7px;
  background:var(--s3);border:1px solid var(--b2);border-radius:2px;
  padding:0 11px;height:26px;min-width:200px;
  margin-left:auto;transition:border-color .14s,box-shadow .14s;
}
.srch-w:focus-within{border-color:var(--b4);box-shadow:0 0 8px rgba(0,255,65,.1);}
.srch-ico{color:var(--t4);font-size:11px;}
.srch-in{background:none;border:none;outline:none;font-family:var(--mono);font-size:9.5px;color:var(--t1);flex:1;}
.srch-in::placeholder{color:var(--t4);}
.srch-kbd{font-family:var(--mono);font-size:7.5px;color:var(--t4);border:1px solid var(--b2);border-radius:2px;padding:1px 5px;}

.bar-r{display:flex;align-items:center;gap:4px;margin-left:8px;}
.vbtn{
  height:26px;padding:0 10px;
  font-family:var(--mono);font-size:8.5px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--b2);border-radius:2px;background:transparent;
  color:var(--t4);cursor:pointer;transition:all .12s;
}
.vbtn:hover{border-color:var(--b3);color:var(--t2);}
.vbtn.on{border-color:var(--y45);color:var(--y);background:var(--y08);}
.rfbtn{
  height:26px;padding:0 11px;
  font-family:var(--mono);font-size:8.5px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  background:transparent;border:1px solid var(--b2);border-radius:2px;
  color:var(--t3);cursor:pointer;transition:all .13s;
  display:flex;align-items:center;gap:6px;
}
.rfbtn:hover{border-color:var(--b4);color:var(--t0);box-shadow:0 0 10px rgba(0,255,65,.1);}
.rfbtn.spin .rfi{animation:rspin .6s linear infinite;display:inline-block;}
@keyframes rspin{to{transform:rotate(360deg);}}
.apip{width:5px;height:5px;border-radius:50%;background:var(--t4);transition:background .3s;}
.rfbtn.live .apip{background:var(--green);box-shadow:0 0 5px var(--green);}
.rfbtn.err  .apip{background:var(--red);}

/* ═══════════════════════════════════
   LAYOUT
═══════════════════════════════════ */
.layout{
  display:grid;
  grid-template-columns:214px 1fr 356px;
  height:calc(100vh - 50px - 76px - 38px - 22px);
}

/* ═══════════════════════════════════
   SIDEBAR
═══════════════════════════════════ */
.sidebar{
  border-right:1px solid var(--b2);
  background:var(--s0);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 7px;border-bottom:1px solid var(--b1);flex-shrink:0;
}
.sb-lbl{font-family:var(--mono);font-size:7.5px;text-transform:uppercase;letter-spacing:.2em;color:var(--t4);font-weight:400;}
.sb-btn{
  font-family:var(--mono);font-size:8px;color:var(--t4);
  border:1px solid var(--b2);border-radius:2px;padding:2px 7px;
  background:transparent;cursor:pointer;transition:all .12s;
}
.sb-btn:hover{border-color:var(--b3);color:var(--t1);background:var(--s3);}
.src-scroll{flex:1;overflow-y:auto;}
.src-scroll::-webkit-scrollbar{width:2px;}
.src-scroll::-webkit-scrollbar-thumb{background:var(--b3);}
.src-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px;border-bottom:1px solid var(--b0);
  cursor:pointer;transition:background .08s;position:relative;
}
.src-row:hover{background:var(--s2);}
.src-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  opacity:0;transition:opacity .12s;
}
.src-row:hover::before{opacity:.8;}
.src-row.cr::before{background:var(--cr);}
.src-row.cg::before{background:var(--cg);}
.src-row.cc::before{background:var(--cc);}
.src-row.cw::before{background:var(--cw);}
.src-row.cm::before{background:var(--cm);}
.src-row.cx::before{background:var(--cx);}
.src-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.src-dot.cx{background:var(--cx);} .src-dot.cw{background:var(--cw);}
.src-dot.cc{background:var(--cc);} .src-dot.cm{background:var(--cm);}
.src-dot.cg{background:var(--cg);} .src-dot.cr{background:var(--cr);}
.src-name{font-family:var(--mono);font-size:10px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .08s;}
.src-row:hover .src-name{color:var(--t1);}
.src-badge{font-family:var(--mono);font-size:7px;font-weight:400;letter-spacing:.07em;padding:1px 5px;border-radius:2px;border:1px solid;flex-shrink:0;}
.bl{color:var(--green);border-color:rgba(0,255,65,.3);background:rgba(0,255,65,.06);}
.bs{color:var(--y);border-color:rgba(245,216,0,.3);background:rgba(245,216,0,.06);}
.bd{color:var(--t4);border-color:var(--b1);background:transparent;}
.kbd-block{flex-shrink:0;border-top:1px solid var(--b2);}
.kbd-hdr{padding:7px 14px 6px;border-bottom:1px solid var(--b1);}
.kbd-grid{display:grid;grid-template-columns:1fr 1fr;}
.kbd-row{
  display:flex;align-items:center;gap:6px;
  padding:5px 14px;border-bottom:1px solid var(--b0);border-right:1px solid var(--b0);
  transition:background .08s;cursor:default;
}
.kbd-row:hover{background:var(--s2);}
.kbd-row:nth-child(even){border-right:none;}
.kbd-key{
  font-family:var(--mono);font-size:7.5px;font-weight:400;
  background:var(--s4);border:1px solid var(--b3);border-bottom:2px solid var(--b3);
  border-radius:2px;padding:1px 6px;color:var(--t1);
  min-width:22px;text-align:center;flex-shrink:0;
}
.kbd-desc{font-family:var(--mono);font-size:8px;color:var(--t4);}

/* ═══════════════════════════════════
   FEED PANEL
═══════════════════════════════════ */
.feed-panel{
  display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--b2);
}
.col-hdr{
  height:22px;flex-shrink:0;
  background:var(--s1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 12px;
}
.col-grid{display:grid;grid-template-columns:38px 16px 108px 1fr;width:100%;}
.ch{font-family:var(--mono);font-size:7.5px;text-transform:uppercase;letter-spacing:.18em;color:var(--t4);font-weight:400;}
.col-hdr-r{margin-left:auto;font-family:var(--mono);font-size:7.5px;color:var(--t4);letter-spacing:.1em;display:flex;align-items:center;gap:5px;}
.col-hdr-pip{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pip 2s ease infinite;}

.feed{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;display:flex;flex-direction:column;gap:8px;}
.feed::-webkit-scrollbar{width:3px;}
.feed::-webkit-scrollbar-thumb{background:var(--b3);border-radius:1px;}
.feed::-webkit-scrollbar-thumb:hover{background:var(--b4);}

/* ═══════════════════════════════════
   NEWS CARD
═══════════════════════════════════ */
.ncard{
  background:#0c0c18;
  border:1px solid rgba(0,255,65,.15);
  border-radius:4px;
  position:relative;cursor:pointer;
  transition:border-color .15s,background .12s,box-shadow .18s;
  animation:cin .22s ease both;
  display:flex;
  flex-direction:column;
  overflow:visible;
  box-shadow:0 1px 3px rgba(0,0,0,.6);
  pointer-events:all;
}
@keyframes cin{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}

/* Left stripe */
.ncard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;border-radius:0;opacity:.25;transition:opacity .12s,box-shadow .12s;
}
.ncard.cx::before{background:var(--cx);}
.ncard.cw::before{background:var(--cw);}
.ncard.cc::before{background:var(--cc);}
.ncard.cm::before{background:var(--cm);}
.ncard.cg::before{background:var(--cg);}
.ncard.cr::before{background:var(--cr);}

.ncard:hover{border-color:rgba(100,180,255,.25);background:#0e0e18;box-shadow:0 0 12px rgba(80,140,255,.06),0 2px 8px rgba(0,0,0,.5);z-index:10;position:relative;}
.ncard:hover::before{opacity:1;}
.ncard.cx:hover::before{box-shadow:2px 0 14px rgba(0,207,255,.5);}
.ncard.cw:hover::before{box-shadow:2px 0 14px rgba(191,95,255,.5);}
.ncard.cc:hover::before{box-shadow:2px 0 14px rgba(0,255,65,.6);}
.ncard.cm:hover::before{box-shadow:2px 0 14px rgba(77,255,180,.5);}
.ncard.cg:hover::before{box-shadow:2px 0 14px rgba(245,216,0,.5);}
.ncard.cr:hover::before{box-shadow:2px 0 14px rgba(255,149,0,.5);}

.ncard.sel{
  border-color:rgba(0,255,65,.3);
  background:rgba(0,255,65,.02);
  box-shadow:0 0 0 1px rgba(0,255,65,.08),0 0 20px rgba(0,255,65,.04);
}
.ncard.sel::before{opacity:1;}
.ncard.sel::after{
  content:'';position:absolute;right:0;top:12%;bottom:12%;
  width:2px;border-radius:0;
  background:var(--t0);box-shadow:0 0 10px var(--t0),0 0 20px rgba(0,255,65,.4);
}

.ncard.brk{
  border-color:rgba(255,42,42,.3) !important;
  background:rgba(255,42,42,.03) !important;
}
.ncard.brk::before{background:var(--red)!important;opacity:1!important;box-shadow:2px 0 16px rgba(255,42,42,.7)!important;}
.ncard.brk:hover{border-color:rgba(255,42,42,.55)!important;background:rgba(255,42,42,.07)!important;}

.ncard.pushed{opacity:.13;pointer-events:none;}
.ncard.skipped{opacity:.05;pointer-events:none;}

.ncard.fl{animation:fl .55s ease both!important;}
@keyframes fl{
  0%{border-color:rgba(0,255,65,.6)!important;background:rgba(0,255,65,.06)!important;}
  100%{border-color:var(--b2);background:var(--s1);}
}

/* Card header */
.nc-head{display:flex;align-items:center;gap:7px;padding:9px 12px 0 13px;}
.nc-time{font-family:var(--mono);font-size:9px;color:#ff4444;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0;letter-spacing:.04em;}
.nc-src{
  display:inline-flex;align-items:center;
  font-family:var(--mono);font-size:9.5px;font-weight:500;
  letter-spacing:.06em;white-space:nowrap;
  padding:2px 9px;border-radius:2px;border:1px solid;flex-shrink:0;
}
.ncard.cx .nc-src{color:var(--cx);border-color:rgba(0,207,255,.3); background:rgba(0,207,255,.07);}
.ncard.cw .nc-src{color:var(--cw);border-color:rgba(191,95,255,.3);background:rgba(191,95,255,.07);}
.ncard.cc .nc-src{color:var(--cc);border-color:rgba(0,255,65,.3);  background:rgba(0,255,65,.06);}
.ncard.cm .nc-src{color:var(--cm);border-color:rgba(77,255,180,.3);background:rgba(77,255,180,.06);}
.ncard.cg .nc-src{color:var(--cg);border-color:rgba(245,216,0,.3); background:rgba(245,216,0,.06);}
.ncard.cr .nc-src{color:var(--cr);border-color:rgba(255,149,0,.3); background:rgba(255,149,0,.06);}

.brk-tag{
  display:inline-flex;align-items:center;
  font-family:var(--mono);font-size:7.5px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;
  color:#000;background:var(--red);padding:1px 7px;border-radius:1px;
  animation:bglow 1.4s ease infinite;flex-shrink:0;
}
@keyframes bglow{0%,100%{box-shadow:0 0 5px rgba(255,42,42,.5);}50%{box-shadow:0 0 16px rgba(255,42,42,1),0 0 30px rgba(255,42,42,.3);}}

.nc-rel{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
.nc-relpct{font-family:var(--mono);font-size:9px;white-space:nowrap;min-width:32px;text-align:right;transition:color .2s;flex-shrink:0;}

/* ── HEADLINE — big, bright, readable ── */
.nc-hl-link{
  display:block;
  text-decoration:none;
  color:inherit;
}
.nc-hl-link:hover{
  text-decoration:underline;
  text-decoration-color:rgba(0,255,65,.3);
  text-underline-offset:3px;
}
.nc-hl{
  font-family:var(--sans);font-size:13.5px;font-weight:500;
  color:#dde6f0;line-height:1.5;
  padding:7px 13px 5px 13px;
  letter-spacing:.01em;transition:color .07s;
}
.ncard:hover .nc-hl{text-shadow:0 0 14px rgba(0,255,65,.2);}
.ncard.sel   .nc-hl{color:var(--t0);text-shadow:0 0 14px rgba(0,255,65,.35);}
.ncard.brk   .nc-hl{color:#ff9090;}

/* ── TICKER TAGS — coin icons below headline ── */
.nc-tickers{
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  padding:4px 14px 10px 14px;
  overflow:visible;
}
.nc-tick{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:8.5px;
  letter-spacing:.05em;
  padding:2px 8px 2px 6px;
  border:1px solid;border-radius:2px;
}
.nc-tick-ico{font-size:11px;line-height:1;}
.nc-tick.btc {color:#f7931a;border-color:rgba(247,147,26,.35);background:rgba(247,147,26,.07);}
.nc-tick.eth {color:#8ea9f7;border-color:rgba(142,169,247,.35);background:rgba(142,169,247,.07);}
.nc-tick.sol {color:#9945ff;border-color:rgba(153,69,255,.35); background:rgba(153,69,255,.07);}
.nc-tick.xrp {color:#00aae4;border-color:rgba(0,170,228,.35);  background:rgba(0,170,228,.07);}
.nc-tick.bnb {color:#f3ba2f;border-color:rgba(243,186,47,.35); background:rgba(243,186,47,.07);}
.nc-tick.doge{color:#c2a633;border-color:rgba(194,166,51,.35); background:rgba(194,166,51,.07);}
.nc-tick.ada {color:#0d7fc1;border-color:rgba(13,127,193,.35); background:rgba(13,127,193,.07);}
.nc-tick.avax{color:#e84142;border-color:rgba(232,65,66,.35);  background:rgba(232,65,66,.07);}
.nc-tick.dot {color:#e6007a;border-color:rgba(230,0,122,.35);  background:rgba(230,0,122,.07);}
.nc-tick.link{color:#2a5ada;border-color:rgba(42,90,218,.35);  background:rgba(42,90,218,.07);}

/* ── AI note (selected only) ── */
.nc-ai{
  font-family:var(--mono);font-size:9.5px;color:var(--t3);line-height:1.62;
  margin:0 12px 8px 14px;
  padding:8px 11px;border-radius:2px;
  background:var(--s3);border:1px solid var(--b2);border-left:2px solid rgba(0,255,65,.3);
  display:none;
}
.ncard.sel .nc-ai,.ncard.exp .nc-ai{display:block;}
.ai-label{font-size:7.5px;letter-spacing:.2em;color:var(--t1);opacity:.6;margin-right:5px;}

/* Card footer */
.nc-foot{
  display:flex;align-items:center;gap:4px;
  padding:7px 12px 8px 14px;
  border-top:1px solid rgba(0,255,65,.15);
  background:#000e00;
  flex-shrink:0;
}
/* Compact: footer hidden unless selected */
.feed-compact .ncard:not(.sel) .nc-foot{ display:none; }
.feed-compact .ncard.sel .nc-foot{ display:flex; }
.fb{
  height:26px;padding:0 11px;
  font-family:var(--mono);font-size:9px;font-weight:400;letter-spacing:.07em;text-transform:uppercase;
  border-radius:2px;cursor:pointer;border:1px solid;transition:all .12s;
  display:inline-flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;
}
.fb-push{border-color:rgba(245,216,0,.6);color:var(--y);background:rgba(245,216,0,.1);padding:0 14px;font-weight:600;}
.fb-push:hover{background:var(--y);color:#000;border-color:var(--y);box-shadow:0 0 16px rgba(245,216,0,.5);}
.fb-edit{border-color:rgba(0,255,65,.25);color:rgba(0,255,65,.7);background:transparent;}
.fb-edit:hover{border-color:var(--b5);color:var(--t0);background:var(--s3);}
.fb-copy{border-color:rgba(0,255,65,.18);color:rgba(0,255,65,.5);background:transparent;}
.fb-copy:hover{border-color:var(--b4);color:var(--t1);}
.fb-x{border-color:rgba(0,207,255,.25);color:rgba(0,207,255,.6);background:transparent;}
.fb-x:hover{border-color:rgba(0,207,255,.6);color:var(--cx);}
.fb-open{border-color:rgba(0,255,65,.18);color:rgba(0,255,65,.5);background:transparent;}
.fb-open:hover{border-color:var(--b4);color:var(--t1);}
.fb-skip{border-color:rgba(255,42,42,.25);color:rgba(255,42,42,.55);background:transparent;margin-left:auto;}
.fb-skip:hover{border-color:rgba(255,42,42,.5);color:var(--red);}
.sent-lbl{
  font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:.08em;
  display:flex;align-items:center;gap:6px;
  border-top:1px solid rgba(0,255,65,.1);width:100%;
  background:rgba(0,255,65,.02);padding:6px 14px;
}
.feed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;}
.fe-ico{font-size:20px;opacity:.07;}
.fe-t{font-family:var(--mono);font-size:10px;color:var(--t4);letter-spacing:.08em;}

/* ═══════════════════════════════════
   RIGHT PANEL
═══════════════════════════════════ */
.right{
  background:var(--s0);
  border-left:1px solid var(--b2);
  display:flex;flex-direction:column;overflow:hidden;
}

/* ── ORDERBOOK ── */
.ob-header{padding:10px 12px 8px;border-bottom:1px solid var(--b2);flex-shrink:0;}
.ob-selector{display:flex;gap:4px;margin-bottom:8px;}
.ob-asset-btn{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:3px;
  font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;
  border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;
  transition:all .12s;
}
.ob-asset-btn:hover{border-color:var(--b3);color:var(--t1);}
.ob-asset-btn.active{border-color:var(--t2);color:var(--t0);background:rgba(255,255,255,.04);}
.ob-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px 8px;}
.ob-stat{display:flex;flex-direction:column;gap:1px;}
.ob-stat-l{font-family:var(--mono);font-size:7px;color:var(--t4);letter-spacing:.15em;text-transform:uppercase;}

.ob-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ob-expand-btn{
  display:flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:3px;
  background:transparent;border:1px solid var(--b2);
  color:var(--t3);cursor:pointer;transition:all .12s;flex-shrink:0;

.ob-brand-inline{
  display:flex;align-items:center;gap:5px;margin-right:4px;
}

  font-family:var(--mono);font-size:7px;
  color:var(--t4);letter-spacing:.12em;text-transform:uppercase;
  white-space:nowrap;
}
@keyframes brand-pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,220,250,.4);}50%{opacity:.7;box-shadow:0 0 0 4px rgba(0,220,250,0);}}

/* ── EXPANDED ORDERBOOK MODE ── */
.ob-expanded .sidebar,
.ob-expanded .feed-col,
.ob-expanded .topbar,
.ob-expanded .statstrip,
.ob-expanded .catbar { display:none!important; }

.ob-expanded .layout {
  grid-template-columns: 0 0 1fr !important;
}

#ob-panel { transition: none; }

.ob-expanded #ob-panel {
  position: fixed;
  inset: 0;
  z-index: 999;
  width: 100vw !important;
  height: 100vh !important;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-left: none !important;
  overflow: hidden;
}

/* Compact horizontal header */
.ob-expanded #ob-panel .ob-header {
  flex-direction: row !important;
  flex-shrink: 0;
  padding: 8px 20px;
  border-bottom: 1px solid var(--b2);
  align-items: center;
  gap: 16px;
}
.ob-expanded #ob-panel .ob-top-row {
  margin-bottom: 0 !important;
  flex-shrink: 0;
}
.ob-expanded #ob-panel .ob-stats {
  display: flex !important;
  flex-direction: row !important;
  gap: 20px;
  align-items: center;
}
.ob-expanded #ob-panel .ob-stat {
  flex-direction: row;
  align-items: baseline;
  gap: 5px;
}

/* Column headers - two panes */
.ob-expanded #ob-panel .ob-cols-header {
  display: grid !important;
  grid-template-columns: 1fr 1fr 1fr 16px 1fr 1fr 1fr;
  padding: 4px 0;
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}
.ob-expanded #ob-panel .ob-cols-header .ob-ch:nth-child(1) { padding-left: 20px; }
.ob-expanded #ob-panel .ob-cols-header .ob-ch:nth-child(3) { padding-right: 8px; }
.ob-expanded #ob-panel .ob-cols-header .ob-ch:nth-child(4) { border-right: 1px solid var(--b2); }
.ob-expanded #ob-panel .ob-cols-header .ob-ch:nth-child(5) { padding-left: 8px; }
.ob-expanded #ob-panel .ob-cols-header .ob-ch:nth-child(7) { padding-right: 20px; }

/* Two-column book layout */
.ob-expanded #ob-panel .ob-book {
  flex: 1;
  display: grid !important;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr auto;
  overflow: hidden;
  min-height: 0;
  border-top: none;
}
.ob-expanded #ob-panel .ob-asks {
  grid-column: 1;
  grid-row: 1;
  display: flex !important;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
  border-right: 1px solid var(--b2);
}
.ob-expanded #ob-panel .ob-bids {
  grid-column: 2;
  grid-row: 1;
  display: flex !important;
  flex-direction: column;
  justify-content: flex-start;
  overflow: hidden;
}
.ob-expanded #ob-panel .ob-spread-row {
  grid-column: 1 / 3;
  grid-row: 2;
  padding: 5px 20px;
  flex-shrink: 0;
}
/* Bigger rows */
.ob-expanded #ob-panel .ob-row { padding: 4px 20px; }
.ob-expanded #ob-panel .ob-price { font-size: 13px !important; font-weight: 600 !important; }
.ob-expanded #ob-panel .ob-size,
.ob-expanded #ob-panel .ob-total { font-size: 12px !important; }
/* Flip expand icon */
.ob-expanded .ob-expand-btn svg { transform: rotate(45deg); }


// ══ THEME SWITCHER ══
function setTheme(t, el){
  const root = document.documentElement;
  if(t==='retro') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', t==='mono'?'mono':'trading');
  const labels = {retro:'RETRO', mono:'MONO', trading:'TRADING DESK'};
  const lbl = document.getElementById('theme-label');
  if(lbl) lbl.textContent = labels[t]||t.toUpperCase();
  document.querySelectorAll('.theme-option').forEach(o=>o.classList.remove('active'));
  if(el) el.classList.add('active');
  closeThemeMenu();
  try{ localStorage.setItem('bbnw-theme', t); }catch(_){}
}
function toggleThemeMenu(e){
  e.stopPropagation();
  const menu = document.getElementById('themeMenu');
  const arrow = document.getElementById('theme-arrow');
  if(!menu) return;
  const isOpen = menu.classList.toggle('open');
  if(arrow) arrow.style.transform = isOpen ? 'rotate(180deg)' : '';
}
function closeThemeMenu(){
  const menu = document.getElementById('themeMenu');
  const arrow = document.getElementById('theme-arrow');
  if(menu) menu.classList.remove('open');
  if(arrow) arrow.style.transform = '';
}
document.addEventListener('click', function(e){
  const sw = document.getElementById('themeSwitcher');
  if(sw && !sw.contains(e.target)) closeThemeMenu();
});
(function(){
  try{
    const saved = localStorage.getItem('bbnw-theme');
    if(saved && saved!=='retro'){
      const opt = [...document.querySelectorAll('.theme-option')].find(o=>(o.getAttribute('onclick')||'').includes(saved));
      setTheme(saved, opt||null);
    }
  }catch(_){}
})();
